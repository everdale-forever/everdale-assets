syntax = "proto3";

package com.google.tuningfork;

enum InstrumentKey {
  CPU = 0;
  GPU = 1;
  SWAPPY_WAIT = 2;
  SWAPPY_SWAP = 3;
  CHOREOGRAPHER = 4;
}

enum Section {
  INVALID = 0;
  GAME = 1;
  MENU = 2;
};

message Annotation {
  Section section = 1;
}

message FidelityParams {
  int32 quality_level = 1;
}
